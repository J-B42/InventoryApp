name: Deploy Python functions to AWS Lambda

on:
  push:
    branches:
      - 'main'
    paths:
      - 'lambda/**/lambda_function.py'
      - 'lambda/**/requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        function:
          - get_all_inventory_items
          - get_inventory_item
          - add_inventory_item
          - delete_inventory_item
          - get_location_inventory_items
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt -t .
          fi
        working-directory: ./lambda/${{ matrix.function }}
      - name: Zip the ${{ matrix.function }} Lambda function
        run: zip -r function.zip ./*
        working-directory: ./lambda/${{ matrix.function }}
      - name: Update Lambda function code
        run: aws lambda update-function-code --function-name ${{ matrix.function }} --zip-file fileb://function.zip --publish
        working-directory: ./lambda/${{ matrix.function }}
      - name: Cleanup ${{ matrix.function }} zip
        run: rm function.zip
        working-directory: ./lambda/${{ matrix.function }}